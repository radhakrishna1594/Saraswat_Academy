<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Student Account | Saraswat Academy</title>

    <link rel="stylesheet" href="">
</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <img src="../assets/images/logo.png" alt="Saraswat Academy" class="logo">

            <h1>Create Your Account</h1>

            <p>Join Saraswat Academy for free.</p>

            <form id="signupForm">

                <div class="input-group">
                    <label>Full Name</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your full name"
                        required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <div class="input-group">
                    <label>Mobile Number</label>
                    <input
                        type="tel"
                        id="mobile"
                        placeholder="10-digit mobile number"
                        maxlength="10"
                        required>
                </div>

                <div class="input-group">
                    <label>Class</label>

                    <select id="studentClass" required>
                        <option value="">Select Class</option>

                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                        <option>11</option>
                        <option>12</option>

                    </select>
                </div>

                <div class="input-group">

                    <label>Board</label>

                    <select id="board" required>

                        <option value="">Select Board</option>

                        <option>CBSE</option>

                        <option>RBSE</option>

                        <option>ICSE</option>

                        <option>Other</option>

                    </select>

                </div>

                <div class="input-group">
                    <label>School (Optional)</label>

                    <input
                        type="text"
                        id="school"
                        placeholder="School Name">
                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Create Password"
                        required>

                </div>

                <div class="input-group">

                    <label>Confirm Password</label>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required>

                </div>

                <div class="checkbox">

                    <input
                        type="checkbox"
                        id="terms"
                        required>

                    <label for="terms">
                        I agree to the Terms & Privacy Policy
                    </label>

                </div>

                <button type="submit" class="signup-btn">

                    Create Free Account

                </button>

            </form>

            <div class="login-link">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </div>

        </div>

    </div>

    <script type="module" src="/asset/js/signup.js"></script>

</body>

</html>
