<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
 <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5363507070190468"
     crossorigin="anonymous"></script><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 10 Mathematics solution NCERT Chapter 5: Arithmetic Progressions- Saraswatacademy.in</title>
<link rel="stylesheet" href="../header.css">
<link rel="stylesheet" href="../assets/styles.css">
<script src="../loader.js"></script>
<script src="../config.js"></script>

<style>

.feedback-section{

display:flex;
justify-content:center;
align-items:center;

}

.feedback-card{

background:#ffffff;

max-width:900px;

width:100%;

padding:45px;

border-radius:18px;

box-shadow:0 20px 60px rgba(0,0,0,.12);

}

.feedback-card h1{

text-align:center;

font-size:34px;

color:#1e3a8a;

margin-bottom:15px;

}

.subtitle{

text-align:center;

color:#666;

font-size:16px;

margin-bottom:40px;

line-height:1.8;

}

.row{

display:flex;

gap:25px;

margin-bottom:25px;

}

.input-box{

flex:1;

display:flex;

flex-direction:column;

}

label{

margin-bottom:8px;

font-weight:600;

color:#333;

}

input,
select,
textarea{

padding:14px 18px;

border:1px solid #d8d8d8;

border-radius:10px;

font-size:15px;

transition:.3s;

outline:none;

}

textarea{

resize:vertical;

}

input:focus,
select:focus,
textarea:focus{

border-color:#2948b1;

box-shadow:0 0 10px rgba(41,72,177,.15);

}

.star-rating{
display:flex;
flex-direction:row-reverse;
justify-content:flex-end;
}

.star-rating input{
display:none;
}

.star-rating label{
font-size:40px;
color:#d4d4d4;
cursor:pointer;
transition:.3s;
padding:0 3px;
}

.star-rating label:hover,
.star-rating label:hover ~ label{
color:#147f12;
}

.star-rating input:checked ~ label{
color:#147f12;
}

.submit-btn{

margin-top:30px;

width:100%;

padding:18px;

border:none;

border-radius:12px;

font-size:18px;

font-weight:600;

cursor:pointer;

background:linear-gradient(90deg,#1d4ed8,#3b82f6);

color:#fff;

transition:.3s;

}

.submit-btn:hover{

transform:translateY(-3px);

box-shadow:0 12px 30px rgba(0,0,0,.2);

}





@media(max-width:768px){

.feedback-card{

padding:30px 20px;

}

.row{

flex-direction:column;

gap:20px;

}

.feedback-card h1{

font-size:28px;

}

.subtitle{

font-size:15px;

}

}
</style>

</head>

<div id="header"></div>

<body>

<section class="feedback-section">

<div class="feedback-card">

<h1>Feedback & Suggestions</h1>

<p class="subtitle">
Your ideas help us improve Saraswat Academy for every student and teacher.
Share your feedback, report an issue, or suggest a new feature.
</p>

<form action="mailto:grassrootedtech@gmail.com" method="post" enctype="text/plain">

<div class="row">

<div class="input-box">
<label>Full Name</label>
<input type="text" name="Full Name" placeholder="Enter your name" required>
</div>

<div class="input-box">
<label>Email Address</label>
<input type="email" name="Email Address" placeholder="Enter your email" required>
</div>

</div>


<div class="row">

<div class="input-box">
<label>I am a</label>

<select name="Role" required>
<option value="">Select</option>
<option>Student</option>
<option>Teacher</option>
<option>Parent</option>
<option>Visitor</option>
</select>

</div>

<div class="input-box">

<label>Suggestion Category</label>

<select name="Suggestion Category" required>
<option value="">Select Category</option>
<option>NCERT Solutions</option>
<option>Notes</option>
<option>MCQs</option>
<option>Worksheets</option>
<option>PYQs</option>
<option>Website Design</option>
<option>Website Speed</option>
<option>Bug Report</option>
<option>Request New Feature</option>
<option>Other</option>
</select>

</div>

</div>


<div class="input-box">

<label>Your Suggestion</label>

<textarea
name="Suggestion"
rows="8"
placeholder="Write your feedback or suggestion here..."
required></textarea>

</div>

<br><br>

<div class="row">

<div class="input-box">

<label>Give Us Star</label>

<div class="star-rating">

<input type="radio" id="5-stars" name="Rating" value="5" required>
<label for="5-stars">&#9733;</label>

<input type="radio" id="4-stars" name="Rating" value="4">
<label for="4-stars">&#9733;</label>

<input type="radio" id="3-stars" name="Rating" value="3">
<label for="3-stars">&#9733;</label>

<input type="radio" id="2-stars" name="Rating" value="2">
<label for="2-stars">&#9733;</label>

<input type="radio" id="1-star" name="Rating" value="1">
<label for="1-star">&#9733;</label>

</div>

</div>

<div class="input-box">

<label>Upload Screenshot (Optional)</label>

<input type="file" name="Screenshot">

</div>

</div>

<button type="submit" class="submit-btn">
Send Suggestion
</button>

</form>


</div>

</section>


 <div id="footer"></div>  

</body>
</html>
