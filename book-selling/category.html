<style>
*{margin:0;padding:0;box-sizing:border-box}
.sa-bookhub-hero{background:linear-gradient(135deg,#1d3769,#23416c);padding:60px 20px;text-align:center;color:#fff}
.sa-bookhub-hero h1{font-size:42px;margin-bottom:10px}
.sa-bookhub-hero p{font-size:18px;opacity:.95;max-width:700px;margin:auto}
.sa-bookhub-search{max-width:700px;margin:30px auto 0}
.sa-bookhub-search input{width:100%;padding:16px;border:none;border-radius:50px;font-size:16px;outline:none}
.sa-bookhub-wrap{max-width:1400px;margin:40px auto;padding:0 20px}
.sa-bookhub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px}
.sa-bookhub-card{background:#fff;border-radius:16px;padding:28px;text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.08);transition:.3s}
.sa-bookhub-card:hover{transform:translateY(-8px);box-shadow:0 18px 35px rgba(0,0,0,.15)}
.sa-bookhub-icon{font-size:54px;margin-bottom:15px}
.sa-bookhub-card h3{color:#163b82;margin-bottom:10px}
.sa-bookhub-card p{line-height:1.7;font-size:15px;color:#555;min-height:75px}
.sa-bookhub-btn{display:inline-block;margin-top:15px;padding:12px 22px;background:#1d6fe8;
color:#fff;text-decoration:none;border-radius:8px;font-weight:bold}
.sa-bookhub-btn:hover{background:#0b56c6}
.sa-bookhub-footer{margin-top:50px;background:#163b82;color:#fff;text-align:center;padding:25px}
@media(max-width:700px){
.sa-bookhub-hero h1{font-size:32px}
.sa-bookhub-hero p{font-size:16px}
}
</style>
</head>
