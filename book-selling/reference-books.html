<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reference Books for all classes  | Saraswat Academy</title>

<link rel="stylesheet" href=".././header.css">

<script src=".././loader.js"></script>
<script src=".././config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f5f7fb;color:#333}
.sa-bookhub-search{max-width:650px;margin:25px auto}
.sa-bookhub-search input{width:100%;padding:15px 18px;border:none;border-radius:40px;font-size:16px}
.sa-bookhub-filter{max-width:1200px;margin:25px auto;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.sa-bookhub-filter a{text-decoration:none;background:#fff;color:#1b4ea1;padding:10px 18px;border-radius:30px;box-shadow:0 3px 8px rgba(0,0,0,.08);font-weight:bold}
.sa-bookhub-section{max-width:1300px;margin:30px auto;padding:0 20px}
.sa-bookhub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px}
.sa-bookhub-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 8px 18px rgba(0,0,0,.08);transition:.3s;text-align:center}
.sa-bookhub-card:hover{transform:translateY(-6px)}
.sa-bookhub-card img{width:170px;height:240px;object-fit:cover;border-radius:8px;background:#eee}
.sa-bookhub-badge{display:inline-block;margin:15px 0;padding:6px 12px;background:#e8f5e9;color:#2e7d32;border-radius:20px;font-size:13px;font-weight:bold}
.sa-bookhub-card h3{font-size:20px;color:#1b4ea1;margin-bottom:10px}
.sa-bookhub-card p{line-height:1.6;min-height:55px}
.sa-bookhub-btn{display:inline-block;margin-top:18px;background:#ff9800;color:#fff;text-decoration:none;padding:12px 22px;border-radius:8px;font-weight:bold}
.sa-bookhub-btn:hover{background:#f57c00}
.sa-bookhub-note{max-width:1200px;margin:40px auto;padding:20px;background:#fff;border-left:5px solid #1b4ea1;border-radius:8px}
</style>
</head>
<body>
    
<div id="header"></div>



<section class="sa-bookhub-section">
<h2 style="margin-bottom:20px;">Reference Books for all classes</h2>
<div class="sa-bookhub-grid">

</div>

<h3>RS Aggarwal class- 10 Mathematics</h3>

</div>

<div class="sa-bookhub-badge">Latest Edition</div>
<h3>Xam Idea Class 10 Mathematics</h3>
